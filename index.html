<html lang="fr">

<div>
  <button class="btn" id="speak-1-100">Ecouter 1-100 vite</button>
  <button class="btn" id="speak-special">Ecouter nombres spéciaux</button>
</div>
<div class="table-container">
  <table id="numbers-table" aria-label="Swiss French number table">
    <thead>
      <tr>
        <th>N°</th>
        <th>Écrit (Suisse)</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</div>
<footer class="attribution">
  <p>Basé sur le projet French Vowels | Généré par l’outil interne de production.</p>
</footer>
<script>
const swissMapping = {
  0: 'zéro', 1: 'un', 2: 'deux', 3: 'trois', 4: 'quatre', 5: 'cinq', 6: 'six', 7: 'sept', 8: 'huit',
  9: 'neuf', 10: 'dix', 11: 'onze', 12: 'douze', 13:'treize', 14:'quatorze', 15:'quinze', 16:'seize',
  20:'vingt', 30:'trente', 40:'quarante', 50:'cinquante', 60:'soixante', 70:'septante',
  80:'huitante', 90:'nonante', 100:'cent', 1000:'mille', 10000:'dix mille', 100000:'cent mille'
};

function swissFrenchNumber(n) {
  if (swissMapping[n]) return swissMapping[n];
  if (n < 20) return 'dix-' + swissMapping[n-10];
  if (n < 100) {
    const ten = Math.floor(n/10) * 10;
    const unit = n % 10;
    let prefix = swissMapping[ten];
    if (unit === 0) return prefix;
    if (unit === 1 && ten !== 80) return `${prefix} et un`; // 21, 31... except 81 => huitante et un accepted too
    return `${prefix}-${swissMapping[unit]}`;
  }
  if (n === 101) return 'cent un';
  if (n === 102) return 'cent deux';
  if (n === 1000 || n === 10000 || n === 100000) return swissMapping[n];
  return n.toString();
}

function createNumbersTable() {
  const tbody = document.querySelector('#numbers-table tbody');
  tbody.innerHTML = '';
  for (let i=1; i<=100; i++) {
    appendRow(i, swissFrenchNumber(i));
  }
  [101,102,1000,10000,100000].forEach(value => appendRow(value, swissFrenchNumber(value)));
}

function appendRow(num, text) {
  const tbody = document.querySelector('#numbers-table tbody');
  const tr = document.createElement('tr');
  tr.innerHTML = `
    <td class="number-cell">${num}</td>
    <td class="text-cell">${text}</td>
    <td><button class="btn" data-number="${num}">Prononcer</button></td>
  `;
  tbody.appendChild(tr);
}

function speak(text) {
  if (!('speechSynthesis' in window)) return alert('Synthèse vocale non supportée.');
  const utterance = new SpeechSynthesisUtterance(text);
  utterance.lang = 'fr-CH';
  window.speechSynthesis.cancel();
  window.speechSynthesis.speak(utterance);
}

document.addEventListener('click', event => {
  if (event.target.matches('.btn[data-number]')) {
    const num = Number(event.target.dataset.number);
    speak(`${num} : ${swissFrenchNumber(num)}`);
  }
});

document.getElementById('speak-1-100').addEventListener('click', () => {
  const sequence = Array.from({length:100}, (_, i) => `${i+1}: ${swissFrenchNumber(i+1)}`).join('. ');
  speak(sequence);
});

document.getElementById('speak-special').addEventListener('click', () => {
  const keys = [101,102,1000,10000,100000];
  const sequence = keys.map(n => `${n}: ${swissFrenchNumber(n)}`).join('. ');
  speak(sequence);
});

createNumbersTable();
</script>
</body>
</html>
