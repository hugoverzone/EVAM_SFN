<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Les nombres en français suisse</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="top-banner">
      <a href="https://www.evam.ch/" target="_blank" rel="noopener noreferrer">
        <img src="../assets/images/logo_EVAM.png" alt="Logo" />
      </a>
    </div>
    <h1>Les nombres en français suisse</h1>
    <div class="table-container">
    <table id="numbers-table" aria-label="Les nombres en Français suisse">
        <thead>
        <tr>
            <th colspan="10">Les nombres en français suisse</th>
        </tr>
        </thead>
        <tbody></tbody>
    </table>
    </div>
    <footer class="attribution">
      <p>Développé par <a href="https://verzone.ch" target="_blank" rel="noopener noreferrer">Hugo Verzone</a></p>
    </footer>
    <script>
        const swissWords = {
            0: 'zéro', 1: 'un', 2: 'deux', 3: 'trois', 4: 'quatre', 5: 'cinq',
            6: 'six', 7: 'sept', 8: 'huit', 9: 'neuf', 10: 'dix', 11: 'onze',
            12: 'douze', 13: 'treize', 14: 'quatorze', 15: 'quinze', 16: 'seize',
            20: 'vingt', 30: 'trente', 40: 'quarante', 50: 'cinquante',
            60: 'soixante', 70: 'septante', 80: 'huitante', 90: 'nonante', 100: 'cent'
        };

        function swissFrenchNumber(n) {
            if (swissWords[n]) return swissWords[n];
            if (n < 20) return `dix-${swissWords[n - 10]}`;

            const tens = Math.floor(n / 10) * 10;
            const units = n % 10;
            if (units === 0) return swissWords[tens];
            if (units === 1) return `${swissWords[tens]} et un`;
            return `${swissWords[tens]}-${swissWords[units]}`;
        }

        function speak(text) {
            if (!('speechSynthesis' in window)) {
                alert('Synthèse vocale non supportée.');
                return;
            }

            const voices = window.speechSynthesis.getVoices();
            const voice = voices.find((v) => v.lang.toLowerCase().startsWith('fr-ch'))
                || voices.find((v) => v.lang.toLowerCase().startsWith('fr'))
                || null;

            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = voice ? voice.lang : 'fr-FR';
            if (voice) utterance.voice = voice;

            window.speechSynthesis.cancel();
            window.speechSynthesis.speak(utterance);
        }

        const tbody = document.querySelector('#numbers-table tbody');
        const fragment = document.createDocumentFragment();
        for (let row = 0; row < 10; row++) {
            const tr = document.createElement('tr');
            for (let col = 1; col <= 10; col++) {
                const number = row * 10 + col;
                const label = swissFrenchNumber(number);
                const td = document.createElement('td');
                td.className = 'number-cell';
                td.onclick = () => speak(label);
                td.innerHTML = `${number}<br>${label}`;
                tr.appendChild(td);
            }
            fragment.appendChild(tr);
        }
        tbody.appendChild(fragment);
    </script>
</body>
</html>
