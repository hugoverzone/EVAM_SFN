<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Les nombres en français suisse</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="top-banner">
      <a href="https://www.evam.ch/" target="_blank" rel="noopener noreferrer">
                <!-- Logo temporarily removed; keep this banner structure for later reuse. -->
      </a>
    </div>
    <!--<h1>Les nombres en français suisse</h1>-->
    <div class="table-container">
    <table id="numbers-table" aria-label="Les nombres en Français suisse">
        <thead>
        <tr>
            <th id="numbers-table-heading" colspan="10">Les nombres en français suisse</th>
        </tr>
        </thead>
        <tbody></tbody>
    </table>
    </div>
        <form class="number-speaker" id="number-speaker-form">
            <input
                id="number-input"
                type="number"
                step="1"
                inputmode="numeric"
                placeholder="Entrez un nombre"
                aria-label="Entrez un nombre à prononcer"
            />
            <button class="btn" type="submit">Dire le nombre</button>
        </form>
    <footer class="attribution">
      <p>Développé par <a href="https://hugo.verzone.ch" target="_blank" rel="noopener noreferrer">Hugo Verzone</a></p>
    </footer>
    <script>

        MAX_SAFE_INTEGER = Number.MAX_SAFE_INTEGER || 999999999999999;

        const swissWords = {
            0: 'zéro', 1: 'un', 2: 'deux', 3: 'trois', 4: 'quatre', 5: 'cinq',
            6: 'six', 7: 'sept', 8: 'huit', 9: 'neuf', 10: 'dix', 11: 'onze',
            12: 'douze', 13: 'treize', 14: 'quatorze', 15: 'quinze', 16: 'seize',
            20: 'vingt', 30: 'trente', 40: 'quarante', 50: 'cinquante',
            60: 'soixante', 70: 'septante', 80: 'huitante', 90: 'nonante', 100: 'cent'
        };

        function joinWithAnd(left, right) {
            return `${left} ${right}`;
        }

        function swissFrenchBelowHundred(n) {
            if (swissWords[n]) return swissWords[n];
            const tens = Math.floor(n / 10) * 10;
            const units = n % 10;
            if (units === 0) return swissWords[tens];
            if (units === 1) return joinWithAnd(swissWords[tens], 'et un');
            return `${swissWords[tens]}-${swissWords[units]}`;
        }

        function swissFrenchBelowThousand(n) {
            if (n < 100) return swissFrenchBelowHundred(n);
            const hundreds = Math.floor(n / 100);
            const remainder = n % 100;
            const hundredPart = hundreds === 1 ? 'cent' : `${swissFrenchNumber(hundreds)} cent`;

            if (remainder === 0) {
                return hundreds === 1 ? 'cent' : `${swissFrenchNumber(hundreds)} cents`;
            }

            return `${hundredPart} ${swissFrenchNumber(remainder)}`;
        }

        function swissFrenchNumber(n) {
            if (!Number.isInteger(n)) {
                throw new TypeError('Le nombre doit être un entier.');
            }

            if (n > MAX_SAFE_INTEGER) {
                throw new RangeError('Le nombre est trop grand, essayez un nombre plus petit.');
            }
            if (n < -MAX_SAFE_INTEGER) {
                throw new RangeError('Le nombre est trop petit, essayez un nombre plus grand.');
            }
            if (n < 0) {
                return `moins ${swissFrenchNumber(Math.abs(n))}`;
            }

            if (n < 1000) {
                return swissFrenchBelowThousand(n);
            }

            const scales = [
                { value: 1_000_000_000, singular: 'milliard', plural: 'milliards' },
                { value: 1_000_000, singular: 'million', plural: 'millions' },
                { value: 1000, singular: 'mille', plural: 'mille' }
            ];

            for (const scale of scales) {
                if (n >= scale.value) {
                    const quotient = Math.floor(n / scale.value);
                    const remainder = n % scale.value;
                    const scalePart = scale.value === 1000 && quotient === 1
                        ? 'mille'
                        : `${swissFrenchNumber(quotient)} ${quotient === 1 ? scale.singular : scale.plural}`;

                    if (remainder === 0) {
                        return scalePart;
                    }

                    return `${scalePart} ${swissFrenchNumber(remainder)}`;
                }
            }

            return swissFrenchBelowThousand(n);
        }

        function speak(text) {
            if (!('speechSynthesis' in window)) {
                alert('Synthèse vocale non supportée.');
                return;
            }

            const voices = window.speechSynthesis.getVoices();
            const voice = voices.find((v) => v.lang.toLowerCase().startsWith('fr-ch'))
                || voices.find((v) => v.lang.toLowerCase().startsWith('fr'))
                || null;

            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = voice ? voice.lang : 'fr-FR';
            if (voice) utterance.voice = voice;

            window.speechSynthesis.cancel();
            window.speechSynthesis.speak(utterance);
        }

        const tbody = document.querySelector('#numbers-table tbody');
        const heading = document.querySelector('#numbers-table-heading');
        const mobileQuery = window.matchMedia('(max-width: 480px)');

        function renderTable() {
            const isMobile = mobileQuery.matches;
            const columns = isMobile ? 5 : 10;
            const rows = isMobile ? 20 : 10;

            heading.colSpan = columns;
            tbody.innerHTML = '';

            const fragment = document.createDocumentFragment();
            for (let row = 0; row < rows; row++) {
                const tr = document.createElement('tr');
                for (let col = 1; col <= columns; col++) {
                    const number = row * columns + col;
                    const label = swissFrenchNumber(number);
                    const td = document.createElement('td');
                    td.className = 'number-cell';
                    td.onclick = () => speak(label);
                    td.innerHTML = `${number}<br>${label}`;
                    tr.appendChild(td);
                }
                fragment.appendChild(tr);
            }
            tbody.appendChild(fragment);
        }

        renderTable();
        mobileQuery.addEventListener('change', renderTable);

        const speakerForm = document.querySelector('#number-speaker-form');
        const numberInput = document.querySelector('#number-input');

        speakerForm.addEventListener('submit', (event) => {
            event.preventDefault();
            const rawValue = numberInput.value.trim();
            const number = Number(rawValue);

            if (rawValue === '' || !Number.isInteger(number)) {
                alert('Veuillez entrer un entier valide.');
                numberInput.focus();
                return;
            }

            try {
                // Count leading zeros
                let leadingZeros = 0;
                for (const char of rawValue) {
                    if (char === '0') {
                        leadingZeros++;
                    } else {
                        break;
                    }
                }

                // Build the text to speak
                let textToSpeak = '';
                if (leadingZeros > 0 && number !== 0) {
                    // Add each leading zero
                    for (let i = 0; i < leadingZeros; i++) {
                        textToSpeak += 'zéro ';
                    }
                }
                // Add the actual number
                textToSpeak += swissFrenchNumber(number);

                speak(textToSpeak);
            } catch (error) {
                if (error instanceof RangeError || error instanceof TypeError) {
                    alert(error.message);
                    numberInput.focus();
                    return;
                }

                throw error;
            }
        });
    </script>
</body>
</html>
